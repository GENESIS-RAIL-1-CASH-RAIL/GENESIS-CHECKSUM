# GENESIS-PHANTOM-FORGE behavioural signature
# Hand-defined from observed Forge v7.3.0 behaviour and known internal loops.
# 2026-04-07 — written in response to silent failure where wargame loop died
# but /health and process stayed up.
#
# This signature WOULD have caught this morning's bug at L2 (wargame_engine
# loop tick missing for hours) and L3 (totalWargames flat at 0 for 96 hours).

service: GENESIS-PHANTOM-FORGE
port: 8856
host: localhost
signature_version: 1
boot_grace_seconds: 120

loops: []
# NOTE: L2 heartbeat monitoring requires the CHECKSUM agent to be embedded
# inside Forge so it can call agent.tick(loopName) from inside loop bodies.
# Forge does NOT yet have the agent wired in (v0.2 backlog: "wire CHECKSUM
# agent into GENESIS-PHANTOM-FORGE loops"). Until then we rely on L1 (process
# poll) + L3 (counter delta polling) to monitor Forge — both of which are
# sufficient because the L3 counters DIRECTLY measure whether the loops are
# producing work. If the live-feed-poll loop dies, totalConsumed stops
# incrementing. If the wargame loop dies, totalScenarios stops incrementing.
# L3 catches the symptom; L2 would catch the cause. Symptom is enough until v0.2.

counters:
  # Live feed must be ingesting
  - name: live-feed.totalConsumed
    endpoint: /live-feed/stats
    json_path: totalConsumed
    min_delta_per_min: 30
  - name: live-feed.totalAdmitted
    endpoint: /live-feed/stats
    json_path: totalAdmitted
    min_delta_per_min: 10
  # NOTE on stats.totalWargames: this counter is for the dedicated Live Wargame
  # loop which is currently dead in v7.3 (the loop is registered but never
  # invoked). CHECKSUM caught this as a confirmed TRUE POSITIVE on 2026-04-07.
  # We REMOVE it from active monitoring because:
  #   1. The failure is already audited and recorded
  #   2. The Campaign Simulator (v7.0 upgrade) is the actual wargame path now
  #   3. totalScenarios + totalSelfPlaySessions cover the Campaign Simulator
  #   4. Restoring totalWargames is filed as Tier 2 backlog
  # Watching dead counters that we know are dead is alarm fatigue, not signal.
  #
  # Campaign Simulator proxies — these are the v7.0 wargame outputs (4-regime
  # PASS/FAIL with survival + PnL).
  #
  # 2026-04-09 RETUNE: yesterday's GENESIS-PHANTOM-FORGE buffer-cap bug fix
  # revealed that the TRUE Forge production rates are far higher than the
  # buffer-capped rates CHECKSUM was previously calibrated against. Old
  # observed rates (capped / pre-fix) vs NEW true rates (post-fix):
  #   totalScenarios:        ~10/hr  →  ~83/hr  (8.3×)
  #   totalSelfPlaySessions: ~2/hr   →  ~11/hr  (5.5×)
  #   totalShadowTrades:     ~500/hr →  ~893/hr (1.8×, was hard-capped at 500)
  # Floors set to ~70% of NEW true rate (±30% band, min side) so CHECKSUM
  # detects a real regression against truth — NOT against the old buffer-
  # capped rates. The previous 1/hour floors were alarm-dead: they would
  # only catch total loop death, not a 5× silent degradation.
  - name: stats.totalScenarios
    endpoint: /health
    json_path: stats.totalScenarios
    min_delta_per_hour: 58
  - name: stats.totalSelfPlaySessions
    endpoint: /health
    json_path: stats.totalSelfPlaySessions
    min_delta_per_hour: 8
  # stats.totalShadowTrades: RESTORED to active monitoring 2026-04-09. The
  # buffer-cap bug that previously froze this counter at 500 was fixed in
  # GENESIS-PHANTOM-FORGE yesterday. True rate is ~893/hr. Floor 625/hr
  # (~70% of truth) catches any regression back toward the old capped
  # regime or a real shadow-pipeline stall.
  - name: stats.totalShadowTrades
    endpoint: /health
    json_path: stats.totalShadowTrades
    min_delta_per_hour: 625

# E2E probes deferred to v0.2 — Forge needs a /shadow/probe/inject endpoint first
e2e: []
